name: Build & Release LaTeX PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compile LaTeX using Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/data blang/latex:ctanfull latexmk -pdf main.tex

      - name: List output files
        run: ls -l

      - name: Rename PDF
        run: mv main.pdf "Kurs name v0.0.${{ github.run_number }}.pdf"

      - name: Create Release and Upload PDF
        uses: ncipollo/release-action@v1
        with:
          tag: v0.0.${{ github.run_number }}
          name: Release v0.0.${{ github.run_number }}
          body: "Automatic release for commit ${{ github.sha }}"
          artifacts: "Kurs name v0.0.${{ github.run_number }}.pdf"

